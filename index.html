hat You have already declared. Amen.","passage":"Jeremiah 1:5 and Romans 4:17","context":"In Jeremiah 1:5, God speaks to Jeremiah with extraordinary intimacy: before I formed you in the womb I knew you, before you were born I set you apart. This was not unique to Jeremiah. It reflects how God relates to every person He creates. In Romans 4:17, Paul describes God as the one who calls things that are not as though they were. This is the God we partner with when we pray prophetically.","reflection":"Every human being who has ever lived was known by God before they were born. Every person has a God-designed purpose, a calling placed within them before they took their first breath. Prophetic intercession for individuals is the practice of asking God to show you His vision for a specific person and then praying that vision into reality. Instead of praying based only on what you can see in a person's current circumstances, you ask God: what do You see in this person? What have You destined them for? What is latent in them that has not yet come to expression? When you receive something in response, you pray it out loud, declaring what God has said over that person's life. You call their destiny forward. You speak life into gifts and callings that are dormant. You agree with what God has already purposed and your agreement carries weight in the spiritual realm. This is one of the most encouraging and life-giving forms of prayer you can engage in for another person.","exercise":"Choose one specific person to intercede for prophetically today. Before you pray, spend several minutes in quiet asking God one simple question: what do You see in this person? What have You destined them for? What is the potential in them that has not yet come forward? Write down whatever comes to your mind and heart. Then pray what you received out loud, speaking it over that person as a declaration of their God-given destiny.","closingPoints":["Intercede prophetically for one specific member of your prayer group today, speaking their God-given identity and calling into the spirit realm.","Ask God to give you spiritual eyes to see the latent gifts, callings, and potential in the people around you.","Pray with faith that every member of your group will walk fully and completely into their God-designed destiny."]},{"day":"Friday","title":"Prophetic Intercession for Nations","opening":"Lord, I ask for the nations as Your inheritance. Show me what You are doing among the peoples of the earth and let me cooperate with it through prayer. Amen.","passage":"Psalm 2:8 and Isaiah 43:5 to 7","context":"In Psalm 2, God speaks to His Son and says: ask me and I will give you the nations as your inheritance, the ends of the earth as your possession. In Isaiah 43, God declares His intention to gather His people from every direction, from every people and nation. Both passages reveal the scope of God's heart: He desires all nations, all peoples, all languages, to know Him.","reflection":"When Jesus taught His disciples to pray, He said: Your Kingdom come, Your will be done on earth as it is in Heaven. The scope of that prayer is the entire earth. Every nation. Every people group. Every language and culture. The Great Commission in Matthew 28 commands the disciples to go and make disciples of all nations. This is not a secondary goal for a small group of dedicated missionaries. It is the primary mission of the entire church. When we pray prophetically for nations, we are not engaging in wishful geopolitics or abstract spiritual exercises. We are partnering with God in His most central and passionate desire: that the earth would be filled with the knowledge of His glory as the waters cover the sea. When you pray for a nation by name, asking God what He is doing there and praying in alignment with His purposes, you are actively participating in the fulfilment of the Great Commission. Your prayers for a nation you may never visit or a people group you have never met are not irrelevant. They are strategic. They are necessary. And God responds to them.","exercise":"Ask God right now to bring one specific nation to your mind. Do not overthink it. Simply open your heart and ask: Lord, which nation do You want me to pray for? Then spend at least ten minutes doing some brief research on that nation's spiritual state, its primary challenges, and what God might already be doing there through His people. Then pray for that nation prophetically: asking what God is currently doing, what He wants to do, and what is standing in the way.","closingPoints":["Pray for the specific nation God placed on your heart today with prophetic faith and sustained intercession.","Ask God to send His labourers into the harvest fields of every nation on earth.","Declare Psalm 2:8 as a prayer for the nations: Lord, ask and You will be given the nations as Your inheritance."]},{"day":"Saturday","title":"Prophetic Declaration Over Dry Bones","opening":"Lord, give me the courage of Ezekiel. To prophesy to what looks completely dead, to declare life over what appears finished, to speak Your Word into impossible situations. Amen.","passage":"Ezekiel 37:1 to 14","context":"In this extraordinary vision, God takes Ezekiel and sets him in the middle of a valley that is full of dry bones. Completely dry bones, meaning the bodies had been dead for a very long time. There was no life, no moisture, no possibility of natural recovery. God then asks Ezekiel a question that must have seemed rhetorical: Son of man, can these bones live? Then He commands Ezekiel to prophesy to the bones.","reflection":"Ezekiel's response when God tells him to prophesy to the dry bones is one of the most instructive moments in all of Scripture for understanding prophetic prayer. He does not argue. He does not explain why it will not work. He does not ask God to make the bones live first and then he will believe. He simply opens his mouth and speaks what God tells him to speak. And as he speaks, an astonishing thing happens. There is a sound, a rattling, as the bones come together. Flesh forms. Skin covers the bodies. Then breath enters and an exceedingly great army stands on its feet. The order is crucial: the word was spoken first, and the visible reality followed. This is the principle of prophetic declaration. You speak what God says before you see what God will do. The dry bones in your life might be a marriage that has grown cold and lifeless. A child who has wandered far from God. A church that has lost its fire. A community consumed by hopelessness. A dream that everyone has pronounced dead. Whatever your valley of dry bones looks like, the instruction from God is the same as the one He gave Ezekiel: prophesy to it. Speak the Word of God over it. Call it back to life.","exercise":"Identify what your valley of dry bones is right now. The thing that looks most hopeless, most dead, most beyond recovery. Stand over it in prayer. Read Ezekiel 37:1 to 10 out loud. Then pray prophetically over your specific situation using the same language: Hear the Word of the Lord. I will cause breath to enter you and you will live. I will attach tendons, flesh will come, skin will cover you. I will breathe life into you. Speak it with conviction. Speak it in faith. Speak it in the name of Jesus.","closingPoints":["Speak life, resurrection, and restoration over every dead or hopeless situation in your intercessory list.","Declare the resurrection power of God over every case that looks too far gone.","Thank God with joy that He specialises in dry bones, that He is the God who raises the dead."]},{"day":"Sunday","title":"Becoming a Prophetic Intercessor","opening":"Lord, I consecrate myself to the ministry of prophetic intercession. Use me as a vessel for Your purposes on the earth, not for my own glory but entirely for Yours. Amen.","passage":"Isaiah 62:6 to 7 and Revelation 8:3 to 5","context":"Isaiah 62 describes watchmen on the walls of Jerusalem who are commanded never to be silent, day or night, giving God no rest until He establishes Jerusalem and makes it a praise in all the earth. In Revelation 8, a vision is given of an angel standing before the golden altar in Heaven, offering incense along with the prayers of all the saints. Then the angel takes the censer, fills it with fire from the altar, and hurls it to the earth with dramatic results.","reflection":"This passage in Revelation is one of the most encouraging things in all of Scripture for the intercessor. The prayers of the saints are gathered before the throne of God like fragrant incense. They accumulate there. And at the right moment, those prayers are turned into fire that falls on the earth and produces earthquakes, thunder, and lightning. Your prayers are not evaporating into empty space. They are not being lost or ignored. They are being gathered before the throne of God and at the appointed time, God releases them back to earth as fire. This means that every prayer you have ever prayed in genuine faith is still active. It is still held before God. It is still effective. The intercessor who stands on the walls and refuses to be silent, who gives God no rest, who prays year after year in obscurity, is building something before the throne that will one day be released with extraordinary power. This is not a metaphor or a nice thought. It is the literal picture Scripture gives us of what happens with prayer in Heaven.","exercise":"Today, write a personal covenant of prophetic intercession. In it, state clearly your commitment to developing the following qualities: a listening ear for God's voice, a willingness to pray His agenda above your own, the discipline of testing what you receive, the faith to declare what God says before you see it, and the perseverance to stand in prayer until the breakthrough comes. Date it. Read it over yourself as a personal commissioning prayer. Keep it somewhere you will regularly return to.","closingPoints":["Receive your identity as a prophetic intercessor with humility, confidence, and deep gratitude.","Pray with faith that your prayers are accumulating as incense before the throne of God right now.","Ask God to release fire from your accumulated prayers back to earth in ways that glorify Him this week."]}]},{"week":10,"theme":"Fire Brand Intercessors: Commissioned","memoryVerse":"I will not keep silent, I will not remain quiet, until her righteousness shines out like the dawn, her salvation like a blazing torch. Isaiah 62:1","days":[{"day":"Monday","title":"You Have Been Changed","opening":"Lord, I pause today to recognise that I am not who I was ten weeks ago. Your Word, Your Spirit, and Your prayer school have transformed me. Thank You. Amen.","passage":"2 Corinthians 3:18 and Philippians 1:6","context":"2 Corinthians 3:18 describes a continuous process that every believer is meant to experience: we are being transformed into the image of Christ with ever-increasing glory, by the Spirit of the Lord. Philippians 1:6 offers a companion assurance: He who began a good work in you will carry it on to completion until the day of Christ Jesus.","reflection":"Take a moment today to look back over the past ten weeks. Week 1: you learned to pray from a position of intimacy with God as Father, understanding prayer as relationship rather than ritual. Week 2: you learned to pray the Word, letting Scripture become the fuel and content of your intercession. Week 3: you learned to partner with the Holy Spirit in prayer, yielding to His leadership and prompting. Week 4: you pursued the Holy Ghost Baptism as essential empowerment. Week 5: you explored the gift of tongues as a powerful and unlimited prayer language. Week 6: you received your calling as an intercessor, learning to stand in the gap. Week 7: you were equipped for spiritual warfare, understanding your identity and authority in Christ. Week 8: you learned the power of fasting as a companion to prayer. Week 9: you began to develop prophetic sensitivity, learning to pray in alignment with Heaven. The person who arrived at week one and the person you are now are not the same. This is not pride. It is simply the fruit of ten weeks of genuine seeking. And the God who began this work in you has not finished. Philippians 1:6 promises that He will carry it on.","exercise":"Spend twenty minutes journaling today. Give yourself to three questions. First: who were you when this prayer school began? Be honest about where you started. Second: who are you now? What specific things have changed in your prayer life, your understanding, your spiritual sensitivity, or your faith? Third: write a testimony that captures the most significant thing God has done in you over these ten weeks. This testimony is a weapon. Share it with your group.","closingPoints":["Thank God with specific and detailed gratitude for every transformation He has worked in you over these ten weeks.","Pray for every member of your group by name, asking that each of them would carry away something that permanently and significantly changes them.","Declare out loud: I am not the same. God has done a new and lasting thing in me."]},{"day":"Tuesday","title":"Your Post on the Wall","opening":"Lord, show me my post. My city, my church, my family, my sphere of influence. I take my position as watchman and I will not abandon my post. Amen.","passage":"Isaiah 62:6 to 7 and Habakkuk 2:1","context":"In Isaiah 62, God commands watchmen to be posted on the walls of Jerusalem. They are to never be silent, day or night. They are to give God no rest until He establishes His purposes. In Habakkuk 2, the prophet makes a decisive personal declaration: I will stand at my watch and station myself on the ramparts. He then waits for God to speak. Both images describe intercessors who have found their post and committed to staying there.","reflection":"One of the most important questions a maturing intercessor eventually faces is this: where exactly is my post? What is the specific territory, the specific people, the specific assignment that God has given me? Not every intercessor is called to pray for the same things. Some carry a strong burden for children and families. Others feel a deep pull to pray for national leadership and government. Others are drawn to pray for the unreached peoples of the world, for the persecuted church, for specific cities or regions, or for specific groups like artists, scientists, or young people. The burden you carry most consistently, the situations that most quickly bring you to tears or most reliably ignite your intercession, the things you find yourself praying about even when you did not plan to: these are indicators of your post. Your intercession assignment is not random. God has specifically placed burdens in your heart that correspond to where He wants you to stand on the wall. Discovering and committing to your post is one of the most significant steps you can take as an intercessor.","exercise":"Spend significant time today in prayer specifically asking God: where is my post? Who and what have You placed in my heart to intercede for in this season? Listen patiently. Write down what you sense. Then write a twelve-month intercession commitment for your primary post: a clear statement of who and what you are committing to pray for consistently over the next year.","closingPoints":["Receive your specific intercession post and assignment with genuine seriousness and holy gratitude.","Ask God to confirm your post through His Word, the inner witness of the Spirit, and the confirmation of others.","Pray for every member of your group that each of them would find, recognise, and faithfully take their post on the wall."]},{"day":"Wednesday","title":"Maintaining the Fire","opening":"Lord, the fire You have kindled in me over these weeks: I refuse to let it go out. Show me the daily habits and disciplines that will keep this flame burning brightly. Amen.","passage":"Leviticus 6:12 to 13 and 2 Timothy 1:6 to 7","context":"In Leviticus 6, God gives a repeated, emphatic instruction to the priests concerning the altar: the fire must be kept burning. It must not go out. Every single morning the priest was required to add fresh wood, arrange the offering, and maintain the flame. In 2 Timothy 1:6, Paul writes something deeply personal and urgent to his young son in the faith: fan into flame the gift of God which is in you through the laying on of my hands.","reflection":"Paul's letter to Timothy contains one of the saddest realities about the Christian life: spiritual fire that is not actively maintained will eventually cool. Timothy apparently needed this reminder. The gift of God in him, the fire that had been placed there, needed fanning. Not because God had taken anything away, but because the demands of life, discouragement, fear, and the pressures of ministry had allowed the fire to grow dim. Paul's instruction is not gentle encouragement from a distance. It carries urgency: fan it into flame. The Greek word for fan into flame is an active, energetic word. It suggests effort, intentionality, repeated action. No one fans a flame by accident. You have to turn toward it deliberately, get close, and blow on it consistently. For you, after ten weeks of this prayer school, the fire in you right now may well be at its highest point. The question is not what you do with this fire today. The question is what you will do with it six months from now, when the school is over, life has gotten busy again, and the initial excitement has settled into the daily reality of consistent spiritual discipline.","exercise":"Write your personal altar maintenance plan today. This is a practical, specific document that describes the daily and weekly spiritual disciplines you are committing to that will keep your fire burning after this school ends. Include your morning prayer time and duration, your fasting rhythm, your Scripture intake, your weekly corporate prayer commitment, your accountability partner arrangements, and any other specific practices you know keep your fire burning brightest. Commit to following this plan for ninety days.","closingPoints":["Ask God honestly to show you the specific habits, patterns, or pressures that are most likely to threaten your fire in the coming months.","Pray for the supernatural grace, the genuine internal motivation, and the consistent accountability to maintain the Spirit's fullness every day.","Declare with faith: The fire on my altar will never go out."]},{"day":"Thursday","title":"Carrying Others with You","opening":"Lord, the fire You placed in me is not for me alone. Give me a shepherd's heart: a genuine desire to bring others with me into deeper prayer. Amen.","passage":"2 Timothy 2:2 and Exodus 17:11 to 13","context":"In 2 Timothy 2:2, Paul gives one of the clearest discipleship instructions in Scripture: the things you have heard from me, entrust them to faithful people who will be able to teach others also. In Exodus 17, Israel is in battle with the Amalekites. As long as Moses held his hands up, Israel prevailed. When his arms grew heavy, the battle turned. Aaron and Hur stepped in, held his arms up on either side, and kept them steady until the battle was won.","reflection":"The image of Aaron and Hur holding up Moses' arms is one of the most tender pictures of community in Scripture. No intercessor can sustain their post alone indefinitely. Everyone grows weary. Everyone needs support. The prayer life you have built over these ten weeks is not meant to be carried in isolation. You need people who will hold your arms up when they grow heavy, who will stand with you when the battle is long, who will pray for you when you are the one who needs intercession. But the Aaron and Hur principle works in two directions. You also need to be the person who holds up someone else's arms. The fire that has been lit in you through this school is meant to be shared, multiplied, and passed on. Paul's instruction to Timothy was specific: pass on what you have received to faithful people who will in turn teach others. The measure of genuine discipleship is multiplication. When the fire you carry ignites another person, and they carry it to another, and that person carries it further, the reach of what was lit in this prayer school extends far beyond the eight of you in this room.","exercise":"Identify one specific person in your life right now who shows genuine hunger for prayer and spiritual depth but who has not had the benefit of the training you have received. Make a specific commitment to spend four weeks praying with and mentoring that person. Share with them the most significant things you have learned in this school. Pray with them. Teach them what you know. Carry them with you.","closingPoints":["Ask God specifically to show you who He has placed in your life for you to carry with you in prayer.","Pray for the boldness, the patience, and the genuine love needed to disciple another person in the school of prayer.","Thank God with deep gratitude for every person who held your arms up and supported your prayer life during this season."]},{"day":"Friday","title":"Prayer and Action","opening":"Lord, let my prayer life not be a substitute for action but the fuel for it. Let every hour I spend in Your presence release greater impact in the world outside it. Amen.","passage":"James 2:17 and Acts 3:1 to 7","context":"James 2:17 contains one of the most direct statements in the New Testament: faith without works is dead. Prayer without corresponding action is similarly incomplete. In Acts 3, Peter and John are on their way to the temple to pray. On the way, they encounter a man who has been lame from birth, begging at the gate. They do not walk past him on the way to their prayer appointment. They stop. They act. They speak. And the man is healed.","reflection":"There is a temptation, particularly among people who are deeply committed to prayer, to use prayer as a substitute for action. It is possible to pray about things you could also do something about, and to use the act of praying as a way of feeling you have responded without actually doing anything in the natural. This is not what prayer is meant to be. Prayer fuels action. It provides the courage, the clarity, the divine appointment, and the supernatural power to act effectively in the world. But it is meant to lead to action. Peter and John's prayer life was what made them who they were. It was the source of their authority and their spiritual power. But that prayer life expressed itself constantly in action: preaching, healing, serving, confronting injustice, standing before authorities, establishing communities. The fire brand intercessor is not someone who retreats from the world to pray. They are someone who goes into the world carrying the fire they cultivated in prayer, and they set things ablaze wherever they go.","exercise":"Spend some time today reviewing your life outside the prayer room. Your work environment, your family, your neighbourhood, your community, your relationships. Ask God honestly: what has this season of prayer been preparing me to do? Where is the prayer room leading me in terms of action? Identify one specific area of practical action you feel called to step into as a direct result of the deeper prayer life you have developed in these ten weeks. Write it down and begin planning.","closingPoints":["Ask God with genuine openness how He wants your deepened prayer life to translate into specific, visible action in this season.","Pray for divine appointments where your prayer and your action come together powerfully to advance the Kingdom.","Declare with conviction: I am a person of prayer and a person of action, both entirely for the glory of God."]},{"day":"Saturday","title":"The Commission","opening":"Lord, as I receive my commissioning today, I say yes to everything You are calling me to. Yes to the post, yes to the fire, and yes to the cost. Here I am, send me. Amen.","passage":"Isaiah 6:8 and Matthew 28:18 to 20","context":"In Isaiah 6, the prophet has just had an overwhelming vision of God's holiness and his own unworthiness. After being cleansed by a coal from the altar, he hears the voice of God asking a question: whom shall I send? And who will go for us? Isaiah's response is immediate and total: here am I, send me. In Matthew 28, the risen Jesus appears to His disciples and issues what has become known as the Great Commission.","reflection":"Isaiah's response to God's call is one of the most beautiful moments in all of prophetic literature. He does not bargain. He does not ask for more information about the assignment. He does not weigh the cost. He simply hears the need and says: here I am, send me. This is the posture of the fully commissioned intercessor. Not naive, not unaware of the cost, but fully surrendered. The Great Commission in Matthew 28 is often understood as a call to evangelism and mission, which it certainly is. But read in the context of everything we have covered over these ten weeks, it is also a comprehensive prayer commission. All authority in Heaven and earth belongs to Jesus. And He sends His disciples out into the world, to make disciples of all nations, and He promises: I am with you always, to the very end of the age. He is with you in your prayer closet. He is with you on the wall. He is with you in the warfare. He is with you in the fast. He is with you as you prophesy over dry bones. He is with you to the very end.","exercise":"Write your personal commissioning statement today. This is a declaration of who you are as an intercessor, what you stand for, what your post is, what you are committed to, and who you carry before God. Make it personal, specific, and bold. Write it in the first person. Date it. Read it out loud over yourself with authority. Keep it somewhere you will see it regularly. Let it be the anchoring statement of your prayer identity going forward from this day.","closingPoints":["Receive your full commissioning today as a fire brand intercessor with joy, confidence, and deep solemnity.","Pray over every member of your group individually, releasing them into their specific assignments with God's blessing.","Declare Isaiah 6:8 over yourself right now: Here am I, Lord. Send me."]},{"day":"Sunday","title":"From Glory to Glory","opening":"Lord, these ten weeks are not the summit. They are the launch pad. Take me from this place of training into a life of ever-increasing prayer, power, and fruitfulness. Amen.","passage":"2 Corinthians 3:18 and Isaiah 40:31","context":"2 Corinthians 3:18 describes the Christian life as a journey from one degree of glory to the next, an ongoing, ever-deepening transformation by the Spirit of God. Isaiah 40:31 gives one of the most beloved promises in Scripture to those who wait on and hope in God: they will renew their strength, they will rise up with wings like eagles, they will run and not grow weary, they will walk and not faint.","reflection":"This is not the end. This is the beginning. The prayer school has given you a foundation, a vocabulary, a set of tools, and most importantly, a fire. But the life of intercession is not a ten-week course. It is a lifetime of discovery, growth, deepening, and ever-increasing fruitfulness. The intercessors who shape history are not those who attended a training programme and then returned to normal life. They are the ones who took what they received and kept pressing in. They kept showing up at the altar. They kept fanning the flame. They kept standing on the wall. They kept prophesying to dry bones. Day after day, week after week, year after year, from glory to glory. Isaiah 40:31 promises that those who wait on the Lord will renew their strength. The word wait here does not mean passive, impatient waiting. It carries the meaning of expectant, attentive waiting like a servant watching their master for the slightest direction. Those who live in this kind of constant, attentive dependence on God find that their strength is continually renewed. They do not burn out. They run and do not grow weary. They walk and do not faint. The best of your prayer life is still ahead of you.","exercise":"Celebrate today with genuine joy and wholehearted worship. Thank God lavishly for every revelation, every breakthrough, every encounter, and every change that has come through these ten weeks. Then look forward with faith. Write down five specific things you believe God wants to do through your prayer life in the next twelve months. Write them as prophetic declarations. Pray over them. Declare them. Then go and pray them into being.","closingPoints":["Celebrate what God has done in these ten weeks with complete, uninhibited, wholehearted gratitude.","Pray with genuine faith and holy ambition for the next chapter: greater fire, greater faith, greater fruitfulness.","Declare these words out loud with conviction: The best of my prayer life is still ahead of me. I am just getting started."]}]}];

var DAYS_ORDER=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
var read={};
var cWeek=1, cDay=0, showOverview=false;

function todayPos(){
  var d=new Date();
  var di=d.getDay()===0?6:d.getDay()-1;
  var wn=Math.min(Math.max(1,Math.ceil(d.getDate()/7)),10);
  return{w:wn,d:di};
}
function loadRead(){try{var s=localStorage.getItem("tpr_read");if(s)read=JSON.parse(s);}catch(e){}}
function saveRead(){try{localStorage.setItem("tpr_read",JSON.stringify(read));}catch(e){}}
function isRead(w,d){return !!(read["w"+w+"d"+d]);}
function markRead(){read["w"+cWeek+"d"+cDay]=true;saveRead();buildSidebar();updateProgress();renderDay();}
function totalRead(){var n=0;DEVOTIONAL.forEach(function(wk,wi){wk.days.forEach(function(_,di){if(isRead(wi+1,di))n++;});});return n;}
function getJournal(){try{return localStorage.getItem("tpr_j_w"+cWeek+"d"+cDay)||"";}catch(e){return "";}}
function saveJournal(v){try{localStorage.setItem("tpr_j_w"+cWeek+"d"+cDay,v);}catch(e){}}

function ini(n){return n.slice(0,2).toUpperCase();}

// ── SIDEBAR ──
function buildSidebar(){
  var nav=document.getElementById("sidebarNav");
  nav.innerHTML=DEVOTIONAL.map(function(wk,wi){
    var wn=wk.week;
    var isActiveWeek=(wn===cWeek);
    var dayButtons=wk.days.map(function(day,di){
      var active=(wn===cWeek&&di===cDay&&!showOverview);
      var done=isRead(wn,di);
      return "<button class='day-btn"+(active?" active":"")+(done?" done":"")+"' onclick='goDay("+wn+","+di+");closeSidebar()'>"
        +"<div class='day-dot'></div>"
        +"<span class='day-btn-day'>"+day.day.slice(0,3)+"</span>"
        +"<span class='day-btn-title'>"+day.title+"</span>"
        +"</button>";
    }).join("");
    return "<div class='week-group'>"
      +"<button class='week-btn"+(isActiveWeek?" active-week":"")+"' onclick='toggleWeek("+wn+")'>"
        +"<div>"
          +"<div class='week-btn-label'>Week "+wn+"</div>"
          +"<div class='week-btn-theme'>"+wk.theme+"</div>"
        +"</div>"
        +"<span class='week-arrow"+(isActiveWeek?" open":"")+"' id='arrow_"+wn+"'>&#9656;</span>"
      +"</button>"
      +"<div class='day-list"+(isActiveWeek?" open":"")+"' id='daylist_"+wn+"'>"+dayButtons+"</div>"
      +"</div>";
  }).join("");
}

function toggleWeek(wn){
  var list=document.getElementById("daylist_"+wn);
  var arrow=document.getElementById("arrow_"+wn);
  var isOpen=list.classList.contains("open");
  // close all
  document.querySelectorAll(".day-list").forEach(function(el){el.classList.remove("open");});
  document.querySelectorAll(".week-arrow").forEach(function(el){el.classList.remove("open");});
  if(!isOpen){list.classList.add("open");arrow.classList.add("open");}
  // show week overview
  cWeek=wn; cDay=0; showOverview=true;
  renderAll();
}

function goDay(wn,di){
  cWeek=wn; cDay=di; showOverview=false;
  renderAll();
}

function goToday(){
  var t=todayPos();
  goDay(t.w,t.d);
  closeSidebar();
}

function navigate(dir){
  if(showOverview){showOverview=false;renderAll();return;}
  var nd=cDay+dir;
  if(nd<0){if(cWeek>1){cWeek--;cDay=6;}else{cDay=0;}}
  else if(nd>6){if(cWeek<10){cWeek++;cDay=0;}else{cDay=6;}}
  else cDay=nd;
  showOverview=false;
  renderAll();
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function updateProgress(){
  var n=totalRead();
  document.getElementById("progPill").textContent=n+" / 70 read";
}

function renderAll(){
  buildSidebar();
  updateProgress();
  if(showOverview) renderWeekOverview();
  else renderDay();
  window.scrollTo(0,0);
}

// ── WEEK OVERVIEW ──
function renderWeekOverview(){
  var wk=DEVOTIONAL[cWeek-1];
  document.getElementById("topTitle").textContent="Week "+cWeek+" of 10";
  document.getElementById("topSub").textContent=wk.theme;
  document.getElementById("bnCenter").textContent="Week "+cWeek+" overview";
  document.getElementById("prevBtn").disabled=(cWeek<=1);
  document.getElementById("nextBtn").disabled=(cWeek>=10);

  var days=wk.days.map(function(day,di){
    var done=isRead(cWeek,di);
    return "<button class='wov-day-btn' onclick='goDay("+cWeek+","+di+")'>"
      +"<span class='wov-day-name'>"+day.day+"</span>"
      +"<span class='wov-day-title'>"+day.title+"</span>"
      +"<div class='wov-check"+(done?" done":"")+"'>"+(done?"&#10003;":"")+"</div>"
      +"</button>";
  }).join("");

  document.getElementById("contentArea").innerHTML=
    "<div class='week-overview'>"
      +"<div class='wov-hdr'>"
        +"<div class='wov-num'>WEEK "+cWeek+" OF 10</div>"
        +"<div class='wov-theme'>"+wk.theme+"</div>"
      +"</div>"
      +"<div class='wov-mv'>"
        +"<div class='wov-mv-label'>Memory Verse</div>"
        +"<div class='wov-mv-text'>"+wk.memoryVerse+"</div>"
      +"</div>"
      +"<div class='wov-days'>"
        +"<div class='wov-days-label'>Choose a day to read</div>"
        +days
      +"</div>"
    +"</div>";
}

// ── DAY VIEW ──
function renderDay(){
  var wk=DEVOTIONAL[cWeek-1];
  var day=wk.days[cDay];
  var done=isRead(cWeek,cDay);

  document.getElementById("topTitle").textContent=day.day+" · "+day.title;
  document.getElementById("topSub").textContent="Week "+cWeek+" of 10 · "+wk.theme;
  document.getElementById("bnCenter").textContent=
    "Week "+cWeek+" · "+(cDay+1)+" of 7";
  document.getElementById("prevBtn").disabled=(cWeek===1&&cDay===0);
  document.getElementById("nextBtn").disabled=(cWeek===10&&cDay===6);

  document.getElementById("contentArea").innerHTML=
    "<div class='day-card'>"
      +"<div class='day-card-hdr'>"
        +"<div class='dc-nav'>"
          +"<button onclick='showWeekOv()'>Week "+cWeek+" overview</button>"
        +"</div>"
        +"<div class='dc-week'>Week "+cWeek+" of 10 · "+wk.theme+"</div>"
        +"<div class='dc-day'>"+day.day+"</div>"
        +"<div class='dc-title'>"+day.title+"</div>"
      +"</div>"
      +"<div class='mem-strip'><b>Memory verse:</b> "+wk.memoryVerse+"</div>"

      // Opening prayer
      +"<div class='section'>"
        +"<div class='sec-badge' style='background:#C6942A;color:#fff'>Opening Prayer and Declaration</div>"
        +"<div class='opening-box'>"+day.opening+"</div>"
      +"</div>"

      // Bible passage
      +"<div class='section'>"
        +"<div class='passage-hdr'>Bible Passage: "+day.passage+"</div>"
        +"<div class='passage-box'>"
          +"<div class='ctx-label'>Context</div>"
          +"<div class='ctx-text'>"+(day.context||"")+"</div>"
          +"<div class='ref-label'>Reflection</div>"
          +"<div class='ref-text'>"+day.reflection+"</div>"
        +"</div>"
      +"</div>"

      // Prayer exercise
      +"<div class='section'>"
        +"<div class='sec-badge' style='background:#375623;color:#fff'>Prayer Exercise</div>"
        +"<div class='exercise-box'>"+day.exercise+"</div>"
      +"</div>"

      // Closing points
      +"<div class='section'>"
        +"<div class='sec-badge' style='background:#0F2027;color:#9FE1CB'>Closing Prayer Points</div>"
        +"<ul class='closing-list'>"
          +day.closingPoints.map(function(pt,i){
            return "<li><div class='cl-num'>"+(i+1)+"</div><span>"+pt+"</span></li>";
          }).join("")
        +"</ul>"
      +"</div>"

      // Journal
      +"<div class='section'>"
        +"<div style='font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;font-family:Arial,sans-serif;margin-bottom:8px'>My Reflection and Notes</div>"
        +"<textarea class='journal-area' id='jEntry' placeholder='Write your thoughts and prayers here...' onchange='saveJournal(this.value)'>"+getJournal()+"</textarea>"
        +"<br>"
        +"<button class='mark-btn"+(done?" done":"")+"' onclick='markRead()' id='markBtn'>"
          +(done?"Read &#10003;":"Mark as read &#10003;")
        +"</button>"
      +"</div>"
    +"</div>";
}

function showWeekOv(){showOverview=true;renderAll();}

// ── INIT ──
function init(){
  loadRead();
  var t=todayPos(); cWeek=t.w; cDay=t.d;
  renderAll();
}
init();
</script>
</body>
</html>
